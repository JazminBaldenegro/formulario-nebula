<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nébula Music - Registro</title>
    <link rel="stylesheet" href="/styles/styles.css">
</head>
<body>

<main class="auth-container">
    <section class="auth-card">

        <div class="form-logo">
            <img src="/imgs/nebula-03.svg" alt="Logo Nébula">
        </div>

        <div class="form-header">
            <h3>Crear Cuenta</h3>
            <p class="form-subtitle">Completa el formulario para registrarte</p>
        </div>

        <form class="auth-form" method="post" action="/crear-cuenta" enctype="application/x-www-form-urlencoded">

            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="ej. Juanito Perez" required minlength="5" maxlength="250">
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" name="correo" placeholder="juanito@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="contrasenia">Contraseña:</label>
                <input type="password" id="contrasenia" name="contrasenia" placeholder="******" required minlength="8">
            </div>

            <div class="form-group">
                <label for="txt_pseudonimo">Pseudónimo:</label>
                <input type="text" id="txt_pseudonimo" name="txt_pseudonimo" required pattern="[a-zA-Z]{3,10}-[0-9]{2,10}" placeholder="Nebula-2025">
            </div>

            <div class="radio-group">
                <label>Género:</label>
                <div>
                    <input type="radio" id="rad_femenino" name="rad_genero" value="femenino">
                    <label for="rad_femenino">Femenino</label>
                    <input type="radio" id="rad_masculino" name="rad_genero" value="masculino">
                    <label for="rad_masculino">Masculino</label>
                    <input type="radio" id="rad_otro" name="rad_genero" value="otro" required>
                    <label for="rad_otro">Otro</label>
                </div>
            </div>

            <div class="form-group">
                <label for="sel_suscripcion">Tipo de Suscripción:</label>
                <select id="sel_suscripcion" name="sel_suscripcion" required>
                    <option value="">--Seleccione una opción</option>
                    <option value="gratis">Gratis</option>
                    <option value="premium_mensual">Premium Mensual ($99/mes)</option>
                    <option value="premium_anual">Premium Anual ($899/anual)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fechaNacimiento">Fecha de Nacimiento:</label>
                <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
            </div>

            <div class="form-group">
                <label for="comentarios">Comentarios o Gustos:</label>
                <textarea id="comentarios" name="comentarios" rows="4" placeholder="Cuéntanos qué música te gusta"></textarea>
            </div>

            <div class="form-group">
                <input type="checkbox" id="terminos" name="chk_terminos" value="aceptado" required>
                <label for="terminos">Acepto los términos y condiciones</label>
            </div>

            <div class="form-group">
                <button type="submit" class="btn-primary">Crear Cuenta</button>
                <button type="reset" class="btn-secundary">Limpiar el formulario</button>
            </div>
            <p class="link">¿Ya tienes una cuenta? <a href="/iniciar-sesion">Iniciar Sesión</a></p>
        </form>



    </section>
</main>

<footer>
    <p>Copyright Nébula 2025.</p>
</footer>

</body>
</html>
